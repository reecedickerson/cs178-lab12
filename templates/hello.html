<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, {{ name }}!</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #e7fce6;
            color: #333;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            color: #007111;  /* EXERCISE 4: try changing this color */
        }
        img {
            margin-top: 20px;
            max-width: 400px;
            border-radius: 8px;
        }
        a {
            display: inline-block;
            margin-top: 30px;
            color: #0066cc;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <!-- ============================================================
         EXERCISE 4: Customize this page! Ideas:
           - Change the background color in the CSS above
           - Swap the image below for a different URL
           - Add a fun fact or quote
           - Link to your /analyze/ page
         ============================================================ -->

    <!-- {{ name }} gets replaced with whatever the user typed in the URL -->
    <h1>Hello, {{ name }}!</h1>

    <p>Great men plant trees they will never feel the shade of.</p>

    <!-- swap this image URL for anything you like -->
    <img src="https://www.universities.com/cache/school_webp_logo/images/school/drake-university-logo-13601.webp" alt="Drake University Logo">

    <br>
    <a href="/analyze/{{ name }}">Analyze your name!</a>

</body>
</html>
